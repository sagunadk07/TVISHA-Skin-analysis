{% extends "base.html" %}

{% block title %}Login - TVISHA{% endblock %}

{% block content %}
<section class="auth-view py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="card border-0 shadow rounded-4 p-4">
          <div class="text-center mb-4">
            <span class="badge bg-brand rounded-pill px-3 py-2 mb-3 small text-uppercase">Welcome Back</span>
            <h1 class="font-display display-6 fw-normal mb-2">Login to Tvisha</h1>
            <p class="text-secondary mb-0">Use your account to access the skin scanner.</p>
          </div>
          <form method="post" action="{{ url_for('login', next=request.args.get('next')) }}">
            <div class="mb-3">
              <label class="form-label fw-semibold" for="email">Email</label>
              <input class="form-control form-control-lg" id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold" for="password">Password</label>
              <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-brand btn-lg rounded-pill w-100" type="submit">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>
          <p class="text-center text-secondary small mt-4 mb-0">
            New to Tvisha? <a class="text-brand fw-semibold" href="{{ url_for('register') }}">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
